{% extends 'base.html' %}

{% block content %}
    <h2>FizzBuzz</h2>
    <ul>
        {% for num in numbers %}
            <li>
                {% if num|divisibleby:3 and num|divisibleby:5 %}
                    FizzBuzz
                {% elif num|divisibleby:3 %}
                    Fizz
                {% elif num|divisibleby:5 %}
                    Buzz
                {% else %}
                    {{ num }}
                {% endif %}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
